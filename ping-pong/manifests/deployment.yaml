apiVersion: apps/v1
kind: Deployment
metadata:
  name: ping-pong-dep
  namespace: exercises
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ping-pong
  template:
    metadata:
      labels:
        app: ping-pong
    spec:
      initContainers:
        - name: wait-for-postgres
          image: docker.io/library/postgres:18.0
          command:
            - sh
            - -c
            - |
              until pg_isready \
                -h ping-pong-postgres-svc \
                -U pingpong \
                -d pingpong
              do
                sleep 2
              done

      containers:
        - name: ping-pong
          image: europe-north1-docker.pkg.dev/dwk-gke-antti-6c49/dwk-images/ping-pong:3.4
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: PORT
              value: "8000"

            - name: DATABASE_URL
              value: postgresql://pingpong@ping-pong-postgres-svc:5432/pingpong
