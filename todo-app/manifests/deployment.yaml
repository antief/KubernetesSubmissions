apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: todo-app
  template:
    metadata:
      labels:
        app: todo-app
    spec:
      volumes:
        - name: image-cache
          persistentVolumeClaim:
            claimName: todo-image-claim
      containers:
        - name: todo-app
          image: todo-app:1.13
          imagePullPolicy: IfNotPresent
          env:
            - name: PORT
              value: "8000"
            - name: IMAGE_FILE
              value: /usr/src/app/files/image.jpg
          volumeMounts:
            - name: image-cache
              mountPath: /usr/src/app/files
