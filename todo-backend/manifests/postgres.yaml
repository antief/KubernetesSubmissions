apiVersion: v1
kind: Service
metadata:
  name: todo-postgres-svc
  namespace: project
spec:
  clusterIP: None
  selector:
    app: todo-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: todo-postgres
  namespace: project
spec:
  serviceName: todo-postgres-svc
  replicas: 1
  selector:
    matchLabels:
      app: todo-postgres
  template:
    metadata:
      labels:
        app: todo-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:18.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgres
              containerPort: 5432

          envFrom:
            - configMapRef:
                name: todo-postgres-config

            - secretRef:
                name: todo-postgres-secret

          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - |
                  pg_isready \
                    -h 127.0.0.1 \
                    -p "$POSTGRES_PORT" \
                    -U "$POSTGRES_USER" \
                    -d "$POSTGRES_DB"
            initialDelaySeconds: 5
            periodSeconds: 5

          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql

  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: local-path
        resources:
          requests:
            storage: 100Mi
